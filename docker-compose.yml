services:
  # ---- Veritabanları ----
  userdb:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: userdb
    ports:
      - "5432:5432"
    volumes:
      - userdb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cms-net

  contentdb:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contentdb
    ports:
      - "5433:5432"
    volumes:
      - contentdb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d contentdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cms-net

  # ---- Mikroservisler ----
  user-service:
    build:
      context: ./user-service
    environment:
      ConnectionStrings__Default: "Host=userdb;Port=5432;Database=userdb;Username=postgres;Password=postgres"
    ports:
      - "8081:8080"
    depends_on:
      userdb:
        condition: service_healthy
    networks:
      - cms-net

  content-service:
    build:
      context: ./content-service
    environment:
      ConnectionStrings__Default: "Host=contentdb;Port=5432;Database=contentdb;Username=postgres;Password=postgres"
      Services__UserService__BaseUrl: "http://user-service:8080/"
      # Medya depolama soketi: Local (varsayılan). S3/AzureBlob için Provider + ilgili ayarları geçin.
      Storage__Provider: "Local"
      Storage__Local__RootPath: "/app/media"
    ports:
      - "8080:8080"
    volumes:
      - content-media:/app/media
    depends_on:
      contentdb:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - cms-net

volumes:
  userdb-data:
  contentdb-data:
  content-media:

networks:
  cms-net:
    driver: bridge
